<svg width="880" height="640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="880" height="640" fill="#0f1117"/>

  <!-- Header -->
  <text x="440" y="72" text-anchor="middle" font-size="38" font-weight="800" fill="#f0f0f0">Subtitle <tspan fill="#e50914">Sync</tspan></text>
  <text x="440" y="104" text-anchor="middle" font-size="16" fill="#8a8fa8">Fix SRT subtitle timing — upload, adjust, download.</text>

  <!-- Tabs -->
  <rect x="180" y="126" width="520" height="50" rx="12" fill="#1a1d27" stroke="#2e3350" stroke-width="1"/>
  <!-- Active tab -->
  <rect x="184" y="130" width="254" height="42" rx="8" fill="#e50914"/>
  <text x="311" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">📄 Single File</text>
  <text x="567" y="157" text-anchor="middle" font-size="14" font-weight="600" fill="#8a8fa8">📁 Batch (Folder)</text>

  <!-- Card -->
  <rect x="180" y="190" width="520" height="420" rx="12" fill="#1a1d27" stroke="#2e3350" stroke-width="1"/>

  <!-- SRT File label -->
  <text x="212" y="228" font-size="11" font-weight="700" fill="#8a8fa8" letter-spacing="0.5">SRT FILE</text>

  <!-- Drop zone -->
  <rect x="212" y="238" width="456" height="150" rx="12" fill="none" stroke="#2e3350" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="440" y="298" text-anchor="middle" font-size="32">📄</text>
  <text x="440" y="334" text-anchor="middle" font-size="15" font-weight="600" fill="#f0f0f0">Drop your .srt file here</text>
  <text x="440" y="356" text-anchor="middle" font-size="13" fill="#8a8fa8">or click to browse</text>

  <!-- Offset label -->
  <text x="212" y="418" font-size="11" font-weight="700" fill="#8a8fa8" letter-spacing="0.5">TIME OFFSET (SECONDS)</text>

  <!-- Offset input -->
  <rect x="212" y="428" width="240" height="46" rx="8" fill="#22263a" stroke="#2e3350" stroke-width="1"/>
  <text x="232" y="458" font-size="20" font-weight="600" fill="#f0f0f0">0</text>

  <!-- Delay btn (active) -->
  <rect x="460" y="428" width="100" height="46" rx="8" fill="#e50914"/>
  <text x="510" y="457" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">⏩ Delay</text>

  <!-- Advance btn -->
  <rect x="568" y="428" width="100" height="46" rx="8" fill="#22263a" stroke="#2e3350" stroke-width="1"/>
  <text x="618" y="457" text-anchor="middle" font-size="13" font-weight="700" fill="#f0f0f0">⏪ Advance</text>

  <!-- Hint -->
  <text x="212" y="494" font-size="12" fill="#8a8fa8">Subtitles appear too early? Use <tspan font-weight="700" fill="#f0f0f0">Delay</tspan>. Too late? Use <tspan font-weight="700" fill="#f0f0f0">Advance</tspan>.</text>

  <!-- Download button (disabled) -->
  <rect x="212" y="514" width="456" height="50" rx="8" fill="#e50914" opacity="0.4"/>
  <text x="440" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Download Fixed Subtitle</text>

  <!-- Footer -->
  <text x="440" y="620" text-anchor="middle" font-size="12" fill="#8a8fa8">Works entirely in your browser — no files are uploaded to any server.</text>
</svg>